---
title: protocol_tunneling_detection
description: Detects tunneling tools that encapsulate traffic within allowed protocols (HTTP, DNS, ICMP).
author: nanos.sh
severity: high
mode: live
detection_mode: scheduled
schedule: "*/5 * * * *"
lookback: 15m
folder: endpoint
mitre_tactics:
  - TA0011
mitre_techniques:
  - T1572
tags:
  - tunneling
  - c2
  - evasion
ai_triage_hints:
  ignore_when:
    - "Known VPN or approved tunneling tool"
    - "IT-managed remote access solution"
  suspicious_when:
    - "Unknown tunneling tool detected"
    - "Tunneling to external IP"
---
source_type=endpoint_edr OR source_type=windows_sysmon
| where action="process_create"
| where process CONTAINS "chisel" OR process CONTAINS "ngrok" OR process CONTAINS "plink" OR process CONTAINS "proxychains" OR process CONTAINS "socat" OR process CONTAINS "iodine" OR process CONTAINS "dnscat"
| risk score=80 entity=src_host factor="Tunneling tool detected"
| where process CONTAINS "http" OR process CONTAINS "socks"
| risk score=85 factor="Active tunnel configuration"
| table timestamp, src_host, user, process_name, process, risk_score, risk_factors
