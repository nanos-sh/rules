---
title: ntds_dit_file_access
description: Detects access or copying of the NTDS.dit file which contains all Active Directory password hashes.
author: nanos.sh
severity: critical
mode: live
detection_mode: scheduled
schedule: "*/1 * * * *"
lookback: 5m
folder: endpoint
mitre_tactics:
  - TA0006
mitre_techniques:
  - T1003.003
tags:
  - ntds
  - active_directory
  - credential_dumping
ai_triage_hints:
  ignore_when:
    - "Authorized backup of domain controller"
    - "Known DR replication process"
  suspicious_when:
    - "ntdsutil or vssadmin used to create shadow copy of ntds.dit"
    - "File copied to non-standard location"
---
source_type=windows_sysmon OR source_type=endpoint_edr
| where action="process_create"
| where (process CONTAINS "ntds.dit") OR (process_name="ntdsutil.exe" AND process CONTAINS "ifm") OR (process CONTAINS "vssadmin" AND process CONTAINS "create shadow")
| risk score=90 entity=src_host factor="NTDS.dit access"
| where process_name="ntdsutil.exe" AND process CONTAINS "create full"
| risk score=95 factor="NTDS.dit IFM creation"
| table timestamp, src_host, user, process_name, process, risk_score, risk_factors
