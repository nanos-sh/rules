---
title: persistence_wmi_event_subscription
description: Detects WMI event subscription creation via wmic.exe. WMI subscriptions are a fileless persistence mechanism — attackers create event filters that trigger malicious actions without leaving traditional artifacts on disk.
author: nanos.sh
severity: critical
mode: staging
detection_mode: scheduled
schedule: "*/1 * * * *"
lookback: 5m
folder: endpoint
mitre_tactics:
  - TA0003
mitre_techniques:
  - T1546.003
tags:
  - persistence
  - wmi
  - fileless
  - endpoint
  - injector-demo
ai_triage_hints:
  ignore_when:
    - "WMI subscription is created by SCCM or a known management agent"
  suspicious_when:
    - "Filter name is unusual or non-descriptive"
    - "Created outside of software deployment windows"
    - "Same host shows other persistence mechanisms in the same timeframe"
---
source_type="windows_sysmon" process_name="wmic.exe" command_line CONTAINS "EventFilter" command_line CONTAINS "CREATE"
| stats count() as hits, values(command_line) as commands, values(user) as users by src_host
| where hits > 0
