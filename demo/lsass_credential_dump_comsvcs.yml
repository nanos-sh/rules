---
title: lsass_credential_dump_comsvcs
description: Detects LSASS memory dump using comsvcs.dll MiniDump technique. This is a high-fidelity indicator of credential access — attackers use rundll32 to call comsvcs.dll's MiniDump export to dump LSASS process memory.
author: nanos.sh
severity: critical
mode: staging
detection_mode: scheduled
schedule: "*/1 * * * *"
lookback: 5m
folder: endpoint
mitre_tactics:
  - TA0006
mitre_techniques:
  - T1003.001
tags:
  - credential-access
  - lsass
  - endpoint
  - injector-demo
ai_triage_hints:
  ignore_when:
    - "Process is from a known EDR or AV performing legitimate memory scanning"
  suspicious_when:
    - "rundll32.exe is the parent process"
    - "Output file is in a temp or writable directory"
    - "Followed by compression or network upload activity"
---
source_type="windows_sysmon" command_line CONTAINS "comsvcs" command_line CONTAINS "MiniDump"
| stats count() as hits, values(command_line) as commands, values(user) as users by src_host
| where hits > 0
