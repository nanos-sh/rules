---
title: cloudtrail_access_denied_burst
description: Detects a user generating multiple AccessDeniedException errors in AWS CloudTrail, indicating potential permission enumeration or use of compromised credentials.
author: nanos.sh
severity: medium
mode: staging
detection_mode: scheduled
schedule: "*/5 * * * *"
lookback: 6m
folder: cloud
mitre_tactics:
  - TA0007
mitre_techniques:
  - T1087
tags:
  - cloud
  - aws
  - access-denied
  - enumeration
  - logblaster-demo
ai_triage_hints:
  ignore_when:
    - "User is a service role hitting expected permission boundaries"
    - "Denied actions are all read-only (Describe*, List*, Get*)"
  suspicious_when:
    - "Denied actions include write or delete operations"
    - "Source IP is outside corporate network"
    - "User has no MFA and is accessing from an unusual region"
    - "Same user also has successful destructive operations"
---
source_type="aws_cloudtrail" status="failure"
| stats count() as denied_count, dc(action) as unique_actions, values(action) as actions_attempted, values(src_ip) as source_ips, min(timestamp) as first_seen, max(timestamp) as last_seen by user
| where denied_count > 3
