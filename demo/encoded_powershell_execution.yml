---
title: encoded_powershell_execution
description: Detects PowerShell execution with -EncodedCommand flag, commonly used to obfuscate malicious scripts and evade detection.
author: nanos.sh
severity: high
mode: staging
detection_mode: scheduled
schedule: "* * * * *"
lookback: 2m
folder: endpoint
mitre_tactics:
  - TA0002
mitre_techniques:
  - T1059.001
tags:
  - powershell
  - evasion
  - endpoint
  - logblaster-demo
ai_triage_hints:
  ignore_when:
    - "Command is from SCCM, Intune, or other management tools"
    - "User is a known IT admin running approved automation"
  suspicious_when:
    - "Parent process is cmd.exe or an Office application"
    - "Encoded payload decodes to IEX, downloadstring, or Net.WebClient"
    - "Execution from a workstation rather than a management server"
---
source_type="windows_sysmon" action="process_created" process CONTAINS "EncodedCommand"
| stats count() as executions, values(process_name) as processes, values(user) as users, values(src_host) as hosts, min(timestamp) as first_seen, max(timestamp) as last_seen by src_host, user
| where executions > 0
