---
title: wmi_event_subscription_persistence
description: Detects WMI event subscription creation used for fileless persistence.
author: nanos.sh
severity: high
mode: live
detection_mode: scheduled
schedule: "*/5 * * * *"
lookback: 15m
folder: endpoint
mitre_tactics:
  - TA0003
mitre_techniques:
  - T1546.003
tags:
  - wmi
  - persistence
  - fileless
  - windows
ai_triage_hints:
  ignore_when:
    - "WMI subscription is from known management tool"
  suspicious_when:
    - "CommandLineEventConsumer executes scripts"
    - "Subscription trigger is system startup or logon"
---
source_type=windows_sysmon
| where action="wmi_event" OR (process_name="wmic.exe" AND process CONTAINS "subscription")
| where process CONTAINS "CommandLineEventConsumer" OR process CONTAINS "__EventFilter" OR process CONTAINS "ActiveScriptEventConsumer"
| risk score=80 entity=src_host factor="WMI event subscription"
| where process CONTAINS "powershell" OR process CONTAINS "cmd.exe"
| risk score=90 factor="Shell in WMI consumer"
| table timestamp, src_host, user, process, risk_score, risk_factors
