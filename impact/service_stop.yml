---
title: critical_service_stopped
description: Detects stopping of critical services including databases, security tools, and backup software.
author: nanos.sh
severity: high
mode: live
detection_mode: scheduled
schedule: "*/2 * * * *"
lookback: 5m
folder: endpoint
mitre_tactics:
  - TA0040
mitre_techniques:
  - T1489
tags:
  - service_stop
  - ransomware_prep
  - windows
ai_triage_hints:
  ignore_when:
    - "Planned maintenance or patching"
    - "Service restart (stop followed by start)"
  suspicious_when:
    - "Multiple critical services stopped"
    - "No corresponding service start"
---
source_type=windows_sysmon OR source_type=endpoint_edr
| where action="process_create"
| where (process_name="sc.exe" AND process CONTAINS "stop") OR (process_name="net.exe" AND process CONTAINS "stop")
| where process CONTAINS "sql" OR process CONTAINS "backup" OR process CONTAINS "vss" OR process CONTAINS "exchange" OR process CONTAINS "sophos" OR process CONTAINS "veeam"
| risk score=70 entity=src_host factor="Critical service stopped"
| where process CONTAINS "vss" OR process CONTAINS "backup"
| risk score=85 factor="Backup service stopped"
| table timestamp, src_host, user, process, risk_score, risk_factors
