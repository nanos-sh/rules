---
title: remote_wmi_process_enumeration
description: Detects WMIC.exe used with /node: to remotely enumerate processes on other hosts, a common reconnaissance and lateral movement technique.
author: nanos.sh
severity: medium
mode: staging
detection_mode: scheduled
schedule: "*/5 * * * *"
lookback: 6m
folder: endpoint
mitre_tactics:
  - TA0007
mitre_techniques:
  - T1047
tags:
  - wmi
  - reconnaissance
  - lateral-movement
  - endpoint
  - logblaster-demo
ai_triage_hints:
  ignore_when:
    - "Source is a management server or SCCM host"
    - "User is a domain admin performing inventory"
  suspicious_when:
    - "Source is a workstation, not a management server"
    - "Target node is a domain controller or sensitive server"
    - "Multiple target nodes queried in a short window"
---
source_type="windows_sysmon" action="process_created" process_name="WMIC.exe" process CONTAINS "/node:"
| stats count() as queries, values(process) as commands, values(user) as actors, min(timestamp) as first_seen, max(timestamp) as last_seen by src_host
| where queries > 0
