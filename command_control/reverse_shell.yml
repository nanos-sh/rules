---
title: reverse_shell_connection
description: Detects patterns consistent with reverse shell connections including stdin/stdout redirection over network.
author: nanos.sh
severity: critical
mode: live
detection_mode: scheduled
schedule: "*/1 * * * *"
lookback: 5m
folder: endpoint
mitre_tactics:
  - TA0011
  - TA0002
mitre_techniques:
  - T1059
tags:
  - reverse_shell
  - c2
  - cross_platform
ai_triage_hints:
  ignore_when:
    - "Authorized remote management tool"
  suspicious_when:
    - "Shell with network redirection"
    - "Netcat or socat with shell command"
---
source_type=endpoint_edr OR source_type=windows_sysmon OR source_type=linux_audit
| where action="process_create"
| where process CONTAINS "nc -e" OR process CONTAINS "ncat -e" OR process CONTAINS "/dev/tcp/" OR process CONTAINS "bash -i" OR process CONTAINS "mkfifo" OR process CONTAINS "socket" AND process CONTAINS "subprocess"
| risk score=90 entity=src_host factor="Reverse shell detected"
| where process CONTAINS "/dev/tcp/"
| risk score=95 factor="Bash reverse shell"
| table timestamp, src_host, user, process_name, process, risk_score, risk_factors
