---
title: windows_failed_login_threshold
description: Detects multiple failed login attempts from the same source host, indicating potential brute force or password spray attack.
author: nanos.sh
severity: medium
mode: staging
detection_mode: scheduled
schedule: "* * * * *"
lookback: 2m
folder: identity
mitre_tactics:
  - TA0006
mitre_techniques:
  - T1110
tags:
  - identity
  - brute-force
  - authentication
  - logblaster-demo
ai_triage_hints:
  ignore_when:
    - "Source is a service account with known retry behavior"
    - "Failures are from a single user mistyping their password (1-2 failures)"
  suspicious_when:
    - "Multiple distinct users targeted from the same source"
    - "Failures use network logon type (type 3) from a workstation"
    - "Source IP is external or from an unusual subnet"
    - "Failures followed by a successful logon (credential found)"
---
source_type="windows_event" action="logon_failure"
| stats count() as failures, dc(user) as targeted_users, values(user) as users, min(timestamp) as first_seen, max(timestamp) as last_seen by src_ip, src_host
| where failures > 5
