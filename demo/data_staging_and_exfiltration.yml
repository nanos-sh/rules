---
title: data_staging_and_exfiltration
description: Detects data staging patterns — robocopy to temp directories, archive creation with Compress-Archive, or base64 encoding of files with certutil. These indicate an attacker collecting and preparing data for exfiltration.
author: nanos.sh
severity: high
mode: staging
detection_mode: scheduled
schedule: "*/5 * * * *"
lookback: 15m
folder: endpoint
mitre_tactics:
  - TA0009
  - TA0010
mitre_techniques:
  - T1560.001
  - T1074.001
tags:
  - exfiltration
  - staging
  - collection
  - endpoint
  - injector-demo
ai_triage_hints:
  ignore_when:
    - "Robocopy is part of a scheduled backup job"
    - "User is IT staff performing documented file migration"
  suspicious_when:
    - "Target directory is in C:\\temp or a user-writable location"
    - "Compress-Archive targets sensitive file types (docx, xlsx, pdf)"
    - "Followed by certutil encoding or network upload"
---
source_type="windows_sysmon" (process_name="robocopy.exe" OR (process_name="powershell.exe" command_line CONTAINS "Compress-Archive") OR (process_name="certutil.exe" command_line CONTAINS "-encode"))
| stats count() as hits, dc(process_name) as unique_tools, values(process_name) as tools, values(command_line) as commands by src_host, user
| where hits > 0
