---
title: lateral_movement_multi_host_logon
description: Detects a single source IP authenticating to multiple hosts via network logon (type 3/10) within a short window. Indicates potential lateral movement via RDP, SMB, or WinRM.
author: nanos.sh
severity: high
mode: staging
detection_mode: scheduled
schedule: "*/5 * * * *"
lookback: 15m
folder: identity
mitre_tactics:
  - TA0008
mitre_techniques:
  - T1021.001
  - T1021.002
tags:
  - lateral-movement
  - rdp
  - smb
  - identity
  - injector-demo
ai_triage_hints:
  ignore_when:
    - "Source IP belongs to a known vulnerability scanner or management server"
    - "User is a service account performing expected multi-host operations"
  suspicious_when:
    - "Logon failures precede successful logons"
    - "Source IP is a workstation, not a server"
    - "Encoded PowerShell execution follows the logon"
---
source_type="windows_event" action="logon_success" src_ip!=""
| stats count() as logons, dc(dest_host) as unique_hosts, values(dest_host) as hosts, values(user) as users by src_ip
| where unique_hosts >= 2 AND logons >= 2
